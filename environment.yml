name: guia-project
channels:
  - conda-forge
  - defaults
dependencies:
  # Python version
  - python=3.10
  
  # Web framework and API
  - flask
  - flask-cors
  
  # LLM and AI packages
  - chromadb
  - sentence-transformers
  
  # Database
  - neo4j
  
  # Utilities
  - python-dotenv
  - python-docx
  
  # Data science essentials
  - pandas
  - numpy
  - scipy
  
  # Jupyter notebooks
  - jupyter
  - jupyterlab
  - ipython
  
  # Development tools
  - pip
  - black
  - flake8

# pip-only packages that may not be available in conda
# Install these via pip after creating the environment
pip:
  - cohere
  - accelerate>=1.7.0
  - huggingface-hub>=0.32.0
  - torch>=2.7.0
  - transformers>=4.52.3
  - openai-whisper
  - imageio-ffmpeg
  - edge-tts
