name: Keep Neo4j Awake

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Neo4j driver
        run: python -m pip install --upgrade neo4j

      - name: Ping Neo4j
        env:
          NEO4J_URI: ${{ secrets.NEO4J_URI }}
          NEO4J_USERNAME: ${{ secrets.NEO4J_USERNAME }}
          NEO4J_PASSWORD: ${{ secrets.NEO4J_PASSWORD }}
          NEO4J_DATABASE: ${{ secrets.NEO4J_DATABASE }}
        run: |
          python - <<'PY'
          import os
          from neo4j import GraphDatabase

          uri = os.environ["NEO4J_URI"]
          username = os.environ["NEO4J_USERNAME"]
          password = os.environ["NEO4J_PASSWORD"]
          database = os.environ.get("NEO4J_DATABASE") or "neo4j"

          driver = GraphDatabase.driver(uri, auth=(username, password))
          try:
              with driver.session(database=database) as session:
                  result = session.run("RETURN 1 AS ok").single()
                  print(f"Neo4j keep-alive result: {result['ok']}")
          finally:
              driver.close()
          PY
