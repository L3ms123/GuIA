<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GuIA Mobile Preview</title>
  <style>
    :root {
      --bg: #111413;
      --panel: #1b201f;
      --text: #f6f3ef;
      --muted: #b9c0bd;
      --border: #4b5551;
      --accent: #8fd8bd;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: grid;
      grid-template-rows: auto 1fr;
      overflow: hidden;
    }

    header {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      padding: 0.85rem 1rem;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
    }

    h1 {
      margin: 0;
      font-size: 1rem;
      font-weight: 700;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      align-items: center;
    }

    button,
    select {
      min-height: 2.4rem;
      border: 1px solid var(--border);
      background: #242b29;
      color: var(--text);
      padding: 0 0.75rem;
      font: inherit;
      cursor: pointer;
    }

    button[aria-pressed="true"] {
      border-color: var(--accent);
      color: var(--accent);
    }

    main {
      display: grid;
      place-items: center;
      padding: 1rem;
      overflow: hidden;
      min-height: 0;
    }

    .phone {
      width: var(--phone-width, 390px);
      height: var(--phone-height, 844px);
      max-width: calc(100vw - 2rem);
      max-height: calc(100vh - 6rem);
      border: 14px solid #050606;
      border-radius: 34px;
      background: #fff;
      box-shadow: 0 18px 70px rgba(0, 0, 0, 0.45);
      overflow: hidden;
      position: relative;
      padding-top: 1.9rem;
    }

    .phone::before {
      content: "";
      position: absolute;
      top: 0.35rem;
      left: 50%;
      width: 36%;
      height: 1.35rem;
      transform: translateX(-50%);
      border-radius: 999px;
      background: #050606;
      z-index: 2;
      pointer-events: none;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      background: #fff;
    }

    .hint {
      margin: 0;
      color: var(--muted);
      font-size: 0.9rem;
    }

    @media (max-width: 720px) {
      header {
        align-items: flex-start;
      }

      .controls {
        width: 100%;
      }

      select,
      button {
        flex: 1;
      }
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>Vista movil de GuIA</h1>
      <p class="hint">Previsualizacion local. Usa los controles para probar tamanos comunes.</p>
    </div>

    <div class="controls" aria-label="Controles de previsualizacion">
      <select id="device-select" aria-label="Tamano de movil">
        <option value="390x844">iPhone 12/13/14 - 390 x 844</option>
        <option value="393x873">Pixel 7 - 393 x 873</option>
        <option value="360x800">Android pequeno - 360 x 800</option>
        <option value="414x896">iPhone grande - 414 x 896</option>
      </select>
      <button id="rotate-btn" type="button" aria-pressed="false">Rotar</button>
      <button id="reload-btn" type="button">Recargar app</button>
    </div>
  </header>

  <main>
    <div class="phone" id="phone-frame">
      <iframe id="preview-frame" src="./index.html" title="Previsualizacion movil de GuIA"></iframe>
    </div>
  </main>

  <script>
    const phone = document.getElementById('phone-frame');
    const frame = document.getElementById('preview-frame');
    const select = document.getElementById('device-select');
    const rotateBtn = document.getElementById('rotate-btn');
    const reloadBtn = document.getElementById('reload-btn');

    let rotated = false;

    function applySize() {
      const [width, height] = select.value.split('x').map(Number);
      phone.style.setProperty('--phone-width', `${rotated ? height : width}px`);
      phone.style.setProperty('--phone-height', `${rotated ? width : height}px`);
      rotateBtn.setAttribute('aria-pressed', rotated ? 'true' : 'false');
    }

    select.addEventListener('change', applySize);
    rotateBtn.addEventListener('click', () => {
      rotated = !rotated;
      applySize();
    });
    reloadBtn.addEventListener('click', () => {
      frame.contentWindow.location.reload();
    });

    applySize();
  </script>
</body>
</html>
